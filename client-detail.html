<!DOCTYPE html>
<html lang="uk">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Клієнт · ОГОнь</title>
<link rel="stylesheet" href="style.css">
<style>
@media (max-width: 768px) {
  .client-banquet-row {
    display: flex !important;
    flex-direction: column;
    gap: 5px;
    padding: 14px 16px;
  }
  .cbr-top { display: flex; justify-content: space-between; align-items: flex-start; }
  .cbr-meta { display: flex; gap: 10px; align-items: center; flex-wrap: wrap; }
  .cbr-bottom { display: flex; justify-content: space-between; align-items: center; padding-top: 8px; border-top: 1px solid var(--border); margin-top: 4px; }
}
</style>
</head>
<body>
<div class="top-bar">
  <div class="top-bar-logo" onclick="location.href='index.html'">🔥 ОГОнь</div>
  <nav class="top-bar-nav">
    <a class="nav-link" href="index.html">Головна</a>
    <a class="nav-link" href="banquets.html">Банкети</a>
    <a class="nav-link active" href="clients.html">Клієнти</a>
  </nav>
  <div class="tbs"></div>
  <a class="btn-primary" href="add.html">+ Новий банкет</a>
</div>

<div class="page-wrap fade-in" style="max-width:1000px">
  <div class="page-header" style="margin-bottom:24px">
    <div style="display:flex;flex-direction:column;gap:10px">
      <a class="btn-back" href="clients.html">← Всі клієнти</a>
      <div style="display:flex;align-items:center;gap:16px">
        <div class="client-avatar" id="clientAvatar" style="width:56px;height:56px;font-size:20px">?</div>
        <div>
          <div class="page-title" id="clientName">Завантаження...</div>
          <div class="page-sub" id="clientPhone"></div>
        </div>
      </div>
    </div>
    <div id="repeatBadge"></div>
  </div>

  <div id="clientContent" style="display:none">
    <div class="stats-grid" id="clientStats" style="margin-bottom:28px"></div>

    <div class="detail-grid">
      <!-- LEFT — info -->
      <div class="info-card">
        <div class="info-card-title">Інформація</div>
        <div id="clientInfo"></div>
      </div>

      <!-- RIGHT — banquets -->
      <div>
        <div class="section-head" style="margin-bottom:14px">
          <div class="section-title">Банкети клієнта</div>
        </div>
        <div class="banquet-list" id="clientBanquets"></div>
      </div>
    </div>
  </div>

  <div id="notFound" style="display:none">
    <div class="empty-state"><div class="empty-icon">❓</div>Клієнта не знайдено</div>
  </div>
</div>

<div class="toast" id="toast"></div>
<script src="db.js"></script>
<script>
db_seed(); renderOfflineBanner();

const isMobile = () => window.innerWidth <= 768;

async function init() {
  const id = getParam('id');
  if (!id) { showNotFound(); return; }

  try {
    const c = await db_getClient(id);
    if (!c) { showNotFound(); return; }

    document.title = `${c.name} · ОГОнь`;
    document.getElementById('clientName').textContent  = c.name;
    document.getElementById('clientPhone').textContent = c.phone;
    document.getElementById('clientAvatar').textContent = c.name.charAt(0);

    const [stats, banquets] = await Promise.all([
      db_getClientStats(c.id),
      db_getClientBanquets(c.id),
    ]);
    const sorted    = banquets.sort((a,b)=>new Date(b.date)-new Date(a.date));
    const avgCheck  = stats.count > 0 ? Math.round(stats.total / stats.count) : 0;
    const totalGuests = sorted.reduce((s,b)=>s+(b.guests||0),0);

    if (stats.count >= 2) {
      document.getElementById('repeatBadge').innerHTML =
        `<span style="background:rgba(232,87,42,.12);border:1px solid rgba(232,87,42,.3);color:var(--accent);font-size:11px;font-weight:800;letter-spacing:.06em;text-transform:uppercase;padding:7px 18px;border-radius:20px">⭐ Постійний клієнт</span>`;
    }

    document.getElementById('clientStats').innerHTML = `
      <div class="stat-card acc"><div class="stat-label">Банкетів</div><div class="stat-val">${stats.count}</div><div class="stat-sub">загалом проведено</div></div>
      <div class="stat-card grn"><div class="stat-label">Загальна виручка</div><div class="stat-val">${fmt(stats.total)}</div><div class="stat-sub">з цього клієнта</div></div>
      <div class="stat-card"><div class="stat-label">Середній чек</div><div class="stat-val">${fmt(avgCheck)}</div><div class="stat-sub">за один банкет</div></div>
    `;

    const lastDate  = stats.last ? fmtDate(stats.last.date) : '—';
    const allTopics = sorted.map(b=>b.comment).filter(Boolean);
    document.getElementById('clientInfo').innerHTML = `
      <div class="info-row"><span class="info-key">Ім'я</span><span class="info-val">${c.name}</span></div>
      <div class="info-row"><span class="info-key">Телефон</span><span class="info-val">${c.phone}</span></div>
      <div class="info-row"><span class="info-key">Клієнт з</span><span class="info-val" style="font-weight:500;color:var(--text-dim)">${c.createdAt?new Date(c.createdAt).toLocaleDateString('uk-UA'):'—'}</span></div>
      <div class="info-row"><span class="info-key">Останній банкет</span><span class="info-val">${lastDate}</span></div>
      <div class="info-row"><span class="info-key">Гостей загалом</span><span class="info-val">👥 ${totalGuests}</span></div>
      ${allTopics.length?`
      <div class="info-row" style="flex-direction:column;align-items:flex-start;gap:8px">
        <span class="info-key">Тематики / коментарі</span>
        <div style="display:flex;flex-direction:column;gap:5px;width:100%">
          ${allTopics.map(t=>`<div style="font-size:12px;color:var(--text-dim);background:var(--surface2);border:1px solid var(--border);border-radius:8px;padding:6px 10px;line-height:1.4">${t}</div>`).join('')}
        </div>
      </div>`:''}
    `;

    const bl = document.getElementById('clientBanquets');
    if (!sorted.length) {
      bl.innerHTML = `<div class="empty-state"><div class="empty-icon">📅</div>Банкетів поки немає</div>`;
    } else if (isMobile()) {
      bl.innerHTML = sorted.map(b=>`
        <div class="banquet-row client-banquet-row" onclick="goTo('banquet-detail.html',{id:'${b.id}'})">
          <div class="cbr-top">
            <div style="font-size:14px;font-weight:700;color:var(--text)">${fmtDate(b.date)}</div>
            <span class="status-pill ${b.status}">${statusLabel(b.status)}</span>
          </div>
          <div class="cbr-meta">
            <span style="font-size:12px;color:var(--text-dim)">👥 ${b.guests}</span>
            ${b.comment?`<span style="font-size:11px;color:var(--text-muted)">${b.comment.slice(0,40)}${b.comment.length>40?'…':''}</span>`:''}
          </div>
          <div class="cbr-bottom">
            <span style="font-size:12px;color:var(--text-dim)">Залог: <b style="color:var(--text)">${fmt(b.deposit)}</b></span>
            <span style="font-family:var(--fh);font-size:15px;font-weight:700;color:var(--accent)">${fmt(b.totalFinal)}</span>
          </div>
        </div>`).join('');
    } else {
      bl.innerHTML = sorted.map(b=>`
        <div class="banquet-row" style="grid-template-columns:92px 1fr 72px 120px 120px 100px" onclick="goTo('banquet-detail.html',{id:'${b.id}'})">
          <div class="br-date">${fmtDate(b.date)}</div>
          <div>${b.comment?`<div class="br-note" style="font-size:12px">${b.comment.slice(0,44)}${b.comment.length>44?'…':''}</div>`:'<div class="br-note">—</div>'}</div>
          <div class="br-guests">👥 ${b.guests}</div>
          <div class="br-sum">${fmt(b.deposit)}</div>
          <div class="br-sum acc">${fmt(b.totalFinal)}</div>
          <div><span class="status-pill ${b.status}">${statusLabel(b.status)}</span></div>
        </div>`).join('');
    }

    document.getElementById('clientContent').style.display='block';
  } catch(err) {
    showToast('⚠️ ' + err.message);
  }
}

function showNotFound() {
  document.getElementById('notFound').style.display='block';
  document.getElementById('clientName').textContent='Клієнта не знайдено';
}

init();
</script>
</body>
</html>
